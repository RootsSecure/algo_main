task: detect
mode: train

# Model
model: yolo26n.pt

# Dataset
data: datasets/merged_jcb_ppe/data.yaml

# Core training
epochs: 120
imgsz: 640
batch: 16
optimizer: AdamW
lr0: 0.001
lrf: 0.01
weight_decay: 0.0005
momentum: 0.937
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# Loss weights
box: 7.5
cls: 0.5
dfl: 1.5

# Augmentation
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 5.0
translate: 0.1
scale: 0.5
shear: 1.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.1
close_mosaic: 10

# Scheduler and stopping
cos_lr: true
patience: 30

# Repro and runtime
amp: true
workers: 8
seed: 42
deterministic: true

# Outputs
project: runs/jcb_ppe
name: yolo26n_adamw
