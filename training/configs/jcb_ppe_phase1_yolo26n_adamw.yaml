task: detect
mode: train

model: yolo26n.pt
data: datasets/merged_jcb_ppe/data.yaml

# Phase 1: representation learning
epochs: 90
imgsz: 640
batch: 8
optimizer: AdamW
lr0: 0.001
lrf: 0.01
weight_decay: 0.0005
momentum: 0.937
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

box: 7.5
cls: 0.5
dfl: 1.5

hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 5.0
translate: 0.1
scale: 0.5
shear: 1.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.1
close_mosaic: 10

cos_lr: true
patience: 30

amp: true
workers: 8
seed: 42
deterministic: true

project: runs/jcb_ppe
name: phase1_adamw
